[Debug]
ShowConsole=0

[General]
TimeWarp=1.0                  ; Time/game speed multiplier

[Graphics]
ReflectionResolution=1024     ; Resolution of the faces for the reflection cubemap. Default is 128
ReflectionFrameSkip=0         ; When enabled (set to 1) the game will render only half the reflection cubemap each frame. When disabled (set to 0) it will render the entire cubemap. Default is Enabled (1).
CarShadowIntensity=1.0        ; Car shadow intensity value that is applied on top of car shadow texture transparency, lower values make it more transparent, higher make it more opaque. Default is 0.5.
CameraNearClip=0.25           ; Camera near clip value. Default is 0.25.
CameraFarClip=2000.0          ; Camera far clip value. Default is 2000.
EnableFPSCounter=0            ; Mini FPS-only version of -frametime. Default is Disabled (0).
MirrorMode=0                  ; Mirror mode toggle that mirrors the world.
CCRadiusMultiplier=30.0       ; Global .cc radius value multiplier, used as model culling distance when nopvs is used.
FogEndMultiplier=1.0          ; Multiplies the fog end distance value across all weathers/TODs.

[Shader]
ShaderEnable=1
FresnelScale=0.5              ; Controls how strongly the viewing angle drives reflections.
EnvironmentScale=1            ; Sets the brightness of the environment cubemap reflected in chrome surfaces.
RimBoost=2                    ; Adds an extra burst of reflection right at the very edge of the car, where the surface almost disappears from view. 
CavityScale=0.1               ; Controls how warm and bright the centre of the headlight cone of another vehicle looks when it hits the car surface. 
HeadlightHotspot=0.15         ; Darkens creases, panel gaps, and concave areas on the car mesh.
SpecularIntensity=1.0         ; Scales the Blinn-Phong specular highlight from the three directional lights in the game.
MaskScale=3.75                ; Overall brightness multiplier for the entire overlay. This scales everything together — environment reflection, rim, specular, and headlight contribution.

[Input]
DeadZoneMultiplier=1.0        ; Multiplies input deadzone value. Higher values make analog input more sensitive. Default is 1.0.
ControllerSteerSpeed=10.0     ; Controller steering speed value. Higher values make analog steering snappier, lower values act as a dampener. Default is 10.0.
UseAzerty=0                   ; Converts Azerty keyboard layout to Qwerty.

[Model]
AIUsePlayerModels=1           ; Force AI cars to use high definition player car models. Default is Enabled (1).

[Physics]
PhysicsFixesBaselineFPS=60.0  ; FPS baseline value for FPS-dependent physics fixes. Default is 60, lowest possible is 60.
MaxVelocity=249.98475
WorldExtentMinX=-2000.0       ; World extents to the Left of the map.
WorldExtentMaxX=2000.0        ; World extents to the Right of the map.
WorldExtentMinZ=-2000.0       ; World extents to the Bottom side of the map.
WorldExtentMaxZ=2000.0        ; World extents to the Upper side of the map.
Gravity=-9.8                  ; Global gravity value. Default is -9.8.

[Network]
EnableOpenSpy=1               ; Replaces GameSpy with OpenSpy.

[Traffic]
TrafficDistanceMultiplier=1.0 ; Distance multiplier at which traffic cars spawn and despawn.

[KinematicSteer]
KinematicSteerEnable=0        ; Enable kinematic steering (0=off, 1=on) [TAKES PRIORITY OVER SMOOTHSTEER]
SteeringRate=8.0              ; Rate at which steering input responds [1.0-10.0]
SteeringLock=1.0              ; Additional steering lock factor [0.0-1.0]
SpeedEnd=100.0                ; Speed (m/s) where steering reduction reaches MinSteeringFactor [80-200]
SCurveSharpness=0.1           ; Smoothness of transition between MaxSteeringFactor and MinSteeringFactor [0.01-1.0]
MaxSteeringFactor=1.0         ; Steering multiplier at 0 m/s [0.95-1.0]
MinSteeringFactor=0.89        ; Steering multiplier at [SpeedEnd] m/s [0.85-1.0]
GyroGain=1.0                  ; Strength of the gyro effect [1.0-5.0]
SlipAngleGain=2.0             ; Strength of the slip correction effect [1.0-5.0]

[SmoothSteer]
SmoothSteerEnable=0
SteeringRate=7.0
CenteringFactor=0.9
SteeringLock=1.0

[Freecam]
EnableFreecam=1
TranslateXZSpeed=20.0         ; Freecam speed on the XZ plane.
TranslateYSpeed=8.0           ; Freecam up/down speed.
TranslateMultiplierStep=0.075 ; Freecam speed multiplier step.
MinTranslateMultiplier=0.06   ; Freecam minimum speed.
MaxTranslateMultiplier=5.0    ; Freecam maximum speed.
RotYSensitivity=0.0009        ; Freecam look left/right sensitivity.
RotXSensitivity=0.0005        ; Freecam look up/down sensitivity.
MinFOV=5.0                    ; Freecam minimum FOV value.
MaxFOV=120.0                  ; Freecam maximum FOV value.
FOVStep=20.0                  ; Freecam FOV step value.

[Input Setup]                 ; Uses Direct Input Keys, use Integer codes from: https://community.bistudio.com/wiki/DIK_KeyCodes
ActivateFreecam=62            ; DIK_F4
FreecamLeft=36                ; DIK_J
FreecamRight=38               ; DIK_L
FreecamForward=23             ; DIK_I
FreecamBackward=37            ; DIK_K
FreecamUp=24                  ; DIK_O
FreecamDown=22                ; DIK_U
FreecamIncreaseFOV=25         ; DIK_P
FreecamDecreaseFOV=39         ; DIK_SEMICOLON
SwitchSpectator=60            ; DIK_F2
ActivateReplayCam=61          ; DIK_F3

[Discord]
UseRPC=1                      ; Discord rich presence toggle. Default is Enabled (1).

[Experimental]
MenuScrollFix=1               ; Attempts to fix a menu scrolling bug when using controllers. Default is Enabled (1).
EnableNoPVSFix=0              ; Fixes crash when using -nopvs, but breaks headlight rendering in some cases. Default is Disabled (0).